name: 'goodbot Architecture Analysis'
description: 'Analyze your codebase architecture and comment on PRs with health grade, SOLID analysis, and violations'
author: 'timeritual'

branding:
  icon: 'shield'
  color: 'green'

inputs:
  mode:
    description: 'Analysis mode: "full" for complete analysis, "diff" for changed files only'
    required: false
    default: 'diff'
  base-branch:
    description: 'Base branch for diff comparison'
    required: false
    default: 'main'
  fail-on-grade:
    description: 'Fail the check if grade is below this (A+, A, B+, B, C+, C, D, F). Leave empty to never fail.'
    required: false
    default: ''
  comment:
    description: 'Post a comment on the PR with results'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Run goodbot analysis
      shell: bash
      env:
        GOODBOT_MODE: ${{ inputs.mode }}
        GOODBOT_BASE: ${{ inputs.base-branch }}
        GOODBOT_FAIL_GRADE: ${{ inputs.fail-on-grade }}
      run: |
        npx goodbot-ai ci --mode "$GOODBOT_MODE" --base "$GOODBOT_BASE" --output /tmp/goodbot-result.md --json /tmp/goodbot-result.json

    - name: Comment on PR
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const body = fs.readFileSync('/tmp/goodbot-result.md', 'utf-8');

          // Find existing goodbot comment
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes('<!-- goodbot-analysis -->'));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Check grade threshold
      if: ${{ inputs.fail-on-grade != '' }}
      shell: bash
      run: |
        GRADE=$(cat /tmp/goodbot-result.json | python3 -c "import json,sys; print(json.load(sys.stdin)['health']['grade'])")
        THRESHOLD="${{ inputs.fail-on-grade }}"
        npx goodbot-ai ci --check-grade "$GRADE" --threshold "$THRESHOLD"
